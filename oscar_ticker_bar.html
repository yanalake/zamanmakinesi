* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#oscar-bar {
  width: 100%;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 14px;
  overflow: hidden;
}
.bar-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.bar-logo {
  font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 3px 8px;
  white-space: nowrap;
}
.bar-controls { display: flex; gap: 6px; margin-left: auto; }
.bar-btn {
  font-size: 12px; padding: 3px 10px;
  background: transparent; border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md); cursor: pointer;
  color: var(--color-text-secondary);
}
.bar-btn:hover { background: var(--color-background-primary); }
.bar-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; }
.ticker-wrap {
  overflow: hidden; white-space: nowrap; position: relative;
}
.ticker-track {
  display: inline-block;
  animation: ticker-scroll 60s linear infinite;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 24px; cursor: default;
}
.ticker-year {
  font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 4px; padding: 2px 6px; white-space: nowrap;
}
.ticker-cat {
  font-size: 12px; color: var(--color-text-secondary); white-space: nowrap;
}
.ticker-winner {
  font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap;
}
.ticker-film {
  font-size: 12px; color: var(--color-text-secondary); white-space: nowrap;
  font-style: italic;
}
.ticker-sep {
  color: var(--color-border-secondary); font-size: 16px; padding: 0 4px;
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
#detail-card {
  margin-top: 10px; display: none;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 12px 14px;
}
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.detail-cell { }
.detail-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.detail-value { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
#search-wrap { margin-top: 8px; display: flex; gap: 6px; }
#search-wrap input { flex: 1; font-size: 13px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
#year-filter { font-size: 13px; padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
#results-list { margin-top: 8px; max-height: 200px; overflow-y: auto; }
.result-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.result-row:hover .ticker-winner { text-decoration: underline; }
</style>

    <span style="font-size:12px;color:var(--color-text-secondary);">1927 – 2024</span>

      <button class="bar-btn" onclick="setMode('search')">Ara</button>

  <div id="search-mode" style="display:none">

      <select id="year-filter" onchange="doSearch()"><option value="">Tüm yıllar</option></select>
    </div>
    <div id="results-list"></div>
  </div>

  <div id="random-mode" style="display:none">
    <div id="detail-card" style="display:block">

    </div>
    <div style="margin-top:8px;text-align:right">

  </div>
</div>

const sorted = [...data].sort((a,b)=>a.y-b.y||a.c.localeCompare(b.c));

function buildItem(entry) {
  return `<span class="ticker-item">
    <span class="ticker-year">${entry.y}</span>
    <span class="ticker-cat">${entry.c}</span>
    <span class="ticker-winner">${entry.w !== '-' ? entry.w : ''}</span>
    ${entry.f && entry.w !== entry.f ? `<span class="ticker-film">${entry.f}</span>` : ''}
  </span><span class="ticker-sep">|</span>`;
}

function buildTicker() {
  const shuffled = [...sorted].sort(()=>Math.random()-0.5);
  const html = shuffled.map(buildItem).join('');
  const track = document.getElementById('track');
  track.innerHTML = html + html;
}

function setMode(m) {
  document.getElementById('ticker-mode').style.display = m==='ticker'?'block':'none';
  document.getElementById('search-mode').style.display = m==='search'?'block':'none';
  document.getElementById('random-mode').style.display = m==='random'?'block':'none';
  document.querySelectorAll('.bar-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(m==='random') showRandom();
}

function showRandom() {
  const e = sorted[Math.floor(Math.random()*sorted.length)];
  const g = document.getElementById('detail-grid');
  g.innerHTML = `
    <div class="detail-cell"><div class="detail-label">Yıl</div><div class="detail-value">${e.y}</div></div>
    <div class="detail-cell"><div class="detail-label">Kategori</div><div class="detail-value">${e.c}</div></div>
    <div class="detail-cell"><div class="detail-label">Kazanan</div><div class="detail-value">${e.w !== '-' ? e.w : '—'}</div></div>
    <div class="detail-cell"><div class="detail-label">Film</div><div class="detail-value">${e.f}</div></div>
    ${e.d && e.d !== '-' ? `<div class="detail-cell"><div class="detail-label">Yönetmen</div><div class="detail-value">${e.d}</div></div>` : ''}
  `;
}

function buildYearFilter() {
  const sel = document.getElementById('year-filter');
  const years = [...new Set(sorted.map(e=>e.y))].sort((a,b)=>a-b);
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    sel.appendChild(o);
  });
}

function doSearch() {
  const q = document.getElementById('q').value.toLowerCase();
  const yr = document.getElementById('year-filter').value;
  const res = sorted.filter(e =>
    (!q || e.w.toLowerCase().includes(q) || e.f.toLowerCase().includes(q) || e.c.toLowerCase().includes(q)) &&
    (!yr || e.y == yr)
  ).slice(0, 30);
  const list = document.getElementById('results-list');
  if (!q && !yr) { list.innerHTML = '<div style="font-size:12px;color:var(--color-text-secondary);padding:6px 0">Arama yapmak için yukarıya yazın...</div>'; return; }
  list.innerHTML = res.length ? res.map(e=>`
    <div class="result-row">
      <span class="ticker-year">${e.y}</span>
      <span class="ticker-cat" style="font-size:11px">${e.c}</span>
      <span class="ticker-winner">${e.w !== '-' ? e.w : e.f}</span>
      ${e.f && e.w !== e.f ? `<span class="ticker-film">${e.f}</span>` : ''}
    </div>`).join('') : '<div style="font-size:12px;color:var(--color-text-secondary);padding:6px 0">Sonuç bulunamadı.</div>';
}

buildTicker();
buildYearFilter();
doSearch();
</script>
