<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAMAN MAKİNESİ | Video Kulübü & DVD Arşivi</title>
    <style>
        /* VHS / CRT EKRAN ESTETİĞİ */
        :root {
            --neon-blue: #0ff;
            --neon-pink: #f0f;
            --crt-green: #0f0;
            --bg-color: #050505;
            --panel-bg: #111;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Ana Konteyner: Tüplü TV Ekranı */
        .crt-screen {
            background-color: var(--bg-color);
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 30px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 1000px;
            position: relative;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 1px 0px 1px rgba(255,0,0,0.5), -1px 0px 1px rgba(0,0,255,0.5);
        }

        /* Tarama Çizgileri (Scanlines) */
        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* VCR OSD Elementleri */
        .vcr-osd {
            color: var(--crt-green);
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 8px var(--crt-green);
        }

        .blink { animation: blinker 1s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        h1 {
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            margin: 10px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            cursor: pointer;
            transition: 0.2s;
        }

        /* Replik Barı */
        .quote-bar {
            background-color: var(--neon-blue);
            color: #000;
            padding: 8px 15px;
            margin-bottom: 10px; /* Alttaki oscar bar ile arayı açmak için azaltıldı */
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--neon-blue);
            text-shadow: none;
        }

        /* OSCAR TICKER BAR STİLLERİ (CRT TEMASINA UYARLANDI) */
        #oscar-bar {
            width: 100%;
            background: #000;
            border: 1px solid var(--neon-blue);
            margin-bottom: 30px;
            padding: 8px 14px;
            overflow: hidden;
            position: relative;
            z-index: 20;
        }
        .bar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .bar-logo {
            font-size: 11px; font-weight: bold; color: #000;
            background: var(--neon-blue);
            padding: 2px 6px; text-transform: uppercase;
        }
        .bar-controls { display: flex; gap: 6px; margin-left: auto; }
        .bar-btn {
            font-size: 10px; padding: 2px 8px; background: transparent; 
            border: 1px solid var(--neon-blue); color: var(--neon-blue);
            cursor: pointer; font-family: inherit; text-transform: uppercase;
        }
        .bar-btn:hover, .bar-btn.active { background: var(--neon-blue); color: #000; }
        
        .ticker-wrap { overflow: hidden; white-space: nowrap; position: relative; border-top: 1px dashed #333; padding-top: 5px; }
        .ticker-track {
            display: inline-block;
            animation: ticker-scroll 240s linear infinite; /* Okuma hızı için 240s yapıldı */
        }
        .ticker-track:hover { animation-play-state: paused; }
        .ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 30px; color: #ccc; font-size: 12px; }
        .ticker-year { color: var(--neon-pink); font-weight: bold; }
        .ticker-winner { color: var(--crt-green); font-weight: bold; }
        .ticker-sep { color: #444; }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        #search-mode, #random-mode { display: none; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        #search-wrap { display: flex; gap: 10px; }
        #search-wrap input, #year-filter {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--crt-green); padding: 5px; font-family: inherit;
        }
        #results-list { max-height: 150px; overflow-y: auto; margin-top: 10px; font-size: 11px; }
        .result-row { padding: 4px 0; border-bottom: 1px solid #222; }

        /* LAYOUT VE DİĞERLERİ */
        .layout-grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; position: relative; z-index: 5; }
        .dvd-menu { display: flex; flex-direction: column; gap: 15px; }
        .dvd-btn {
            background: transparent; color: #fff; border: 1px solid transparent;
            font-size: 1.1rem; text-align: left; cursor: pointer; text-transform: uppercase;
            padding: 12px 10px; transition: all 0.2s ease; font-family: inherit; position: relative; outline: none;
        }
        .dvd-btn:hover, .dvd-btn.active { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); background: rgba(0, 255, 255, 0.05); border-bottom: 1px solid var(--neon-blue); padding-left: 20px; }
        .content-screen { background-color: var(--panel-bg); border: 1px solid #333; padding: 25px; min-height: 450px; border-left: 4px solid var(--neon-pink); }
        .section { display: none; }
        .section.active { display: block; animation: staticFlicker 0.4s ease-out; }
    </style>
</head>
<body>

    <div class="crt-screen">
        <div class="vcr-osd">
            <span>PLAY ▶</span>
            <span class="blink">REC ●</span>
            <span id="vcr-clock">12:34:56</span>
        </div>

        <h1 onclick="showCh99()">ZAMAN MAKİNESİ</h1>

        <div class="quote-bar">
            "I'm going to make him an offer he can't refuse." - The Godfather (1972)
        </div>

        <div id="oscar-bar">
            <div class="bar-header">
                <span class="bar-logo">Academy Awards</span>
                <span style="font-size:10px; color:#666;">1927 – 2024 ARCHIVE</span>
                <div class="bar-controls">
                    <button class="bar-btn active" onclick="setMode('ticker')">Döngü</button>
                    <button class="bar-btn" onclick="setMode('search')">Ara</button>
                    <button class="bar-btn" onclick="setMode('random')">Şanslıyım</button>
                </div>
            </div>
            
            <div id="ticker-mode">
                <div class="ticker-wrap">
                    <div class="ticker-track" id="track"></div>
                </div>
            </div>

            <div id="search-mode">
                <div id="search-wrap">
                    <input id="q" type="text" placeholder="Film/Kişi..." oninput="doSearch()" style="flex:1">
                    <select id="year-filter" onchange="doSearch()"><option value="">Yıl</option></select>
                </div>
                <div id="results-list"></div>
            </div>

            <div id="random-mode">
                <div id="detail-card" style="display:block; color: var(--crt-green); font-size:12px;">
                    <div id="detail-grid"></div>
                </div>
                <button class="bar-btn" onclick="showRandom()" style="margin-top:5px">YENİLE</button>
            </div>
        </div>

        <div class="layout-grid">
            <nav class="dvd-menu">
                <button class="dvd-btn active" onclick="showSection('home')">ANA SAYFA</button>
                <button class="dvd-btn" onclick="showSection('archive')">DVD ARŞİVİ</button>
                <button class="dvd-btn" onclick="showSection('blog')">SİNEMA GÜNLÜĞÜ</button>
                <button class="dvd-btn" onclick="showSection('dictionary')">SİNEMA SÖZLÜĞÜ</button>
                <button class="dvd-btn" onclick="showSection('about')">HAKKIMIZDA</button>
            </nav>

            <main class="content-screen">
                <section id="home" class="section active">
                    <h2>HOŞ GELDİNİZ, SİNEMASEVER...</h2>
                    <p>Burası zamanın durduğu, 90'ların o tozlu video kulübü raflarının dijital izdüşümü.</p>
                </section>
                </main>
        </div>
    </div>

    <script>
        // Saat Güncelleme
        function updateClock() {
            const now = new Date();
            document.getElementById('vcr-clock').innerText = now.toLocaleTimeString('tr-TR');
        }
        setInterval(updateClock, 1000);

        // Menü Geçişleri
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.dvd-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- OSCAR BAR LOGIC ---
        const oscarData = [
            {y:1928,c:"En İyi Film",w:"Wings",f:"Wings",d:"William A. Wellman"},
            {y:1939,c:"En İyi Film",w:"Gone with the Wind",f:"Gone with the Wind",d:"Victor Fleming"},
            {y:1942,c:"En İyi Film",w:"Casablanca",f:"Casablanca",d:"Michael Curtiz"},
            {y:1972,c:"En İyi Film",w:"The Godfather",f:"The Godfather",d:"Francis Ford Coppola"},
            {y:1993,c:"En İyi Film",w:"Schindler's List",f:"Schindler's List",d:"Steven Spielberg"},
            {y:1994,c:"En İyi Film",w:"Forrest Gump",f:"Forrest Gump",d:"Robert Zemeckis"},
            {y:2019,c:"En İyi Film",w:"Parasite",f:"Parasite",d:"Bong Joon-ho"},
            {y:2023,c:"En İyi Film",w:"Oppenheimer",f:"Oppenheimer",d:"Christopher Nolan"}
            // ... Verinin geri kalanı buraya eklenebilir
        ];

        const sorted = [...oscarData].sort((a,b) => b.y - a.y);

        function initTicker() {
            const track = document.getElementById('track');
            const items = sorted.map(e => `
                <div class="ticker-item">
                    <span class="ticker-year">${e.y}</span>
                    <span class="ticker-winner">${e.w}</span>
                    <span class="ticker-sep">|</span>
                    <span class="ticker-film">${e.f}</span>
                </div>
            `).join('');
            track.innerHTML = items + items; // Sonsuz döngü için çift
        }

        function setMode(m) {
            ['ticker-mode','search-mode','random-mode'].forEach(id => document.getElementById(id).style.display='none');
            document.getElementById(m+'-mode').style.display='block';
            document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(m === 'random') showRandom();
        }

        function buildYearFilter() {
            const sel = document.getElementById('year-filter');
            const years = [...new Set(oscarData.map(e=>e.y))].sort((a,b)=>b-a);
            years.forEach(y => {
                const o = document.createElement('option');
                o.value = y; o.textContent = y;
                sel.appendChild(o);
            });
        }

        function doSearch() {
            const q = document.getElementById('q').value.toLowerCase();
            const yr = document.getElementById('year-filter').value;
            const res = oscarData.filter(e => 
                (!q || e.w.toLowerCase().includes(q) || e.f.toLowerCase().includes(q)) && 
                (!yr || e.y == yr)
            ).slice(0, 20);
            
            const list = document.getElementById('results-list');
            list.innerHTML = res.map(e => `<div class="result-row">${e.y} - ${e.w}</div>`).join('');
        }

        function showRandom() {
            const r = oscarData[Math.floor(Math.random()*oscarData.length)];
            document.getElementById('detail-grid').innerHTML = `
                <div><strong>YIL:</strong> ${r.y}</div>
                <div><strong>KAZANAN:</strong> ${r.w}</div>
                <div><strong>YÖNETMEN:</strong> ${r.d}</div>
            `;
        }

        // Başlangıç Çalıştırmaları
        window.onload = () => {
            initTicker();
            buildYearFilter();
            updateClock();
        };
    </script>
</body>
</html>
